services:
  # ── Public web: SvelteKit frontend ──────────────────────────────────────────
  - type: web
    name: frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # Internal Render private-network address of the API service
      - key: API_URL
        value: http://api:4000
      # Set to https://<your-frontend>.onrender.com after first deploy
      - key: ORIGIN
        sync: false

  # ── Private service: Fastify API ────────────────────────────────────────────
  - type: pserv
    name: api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    plan: free
    healthCheckPath: /health
    # Persistent disk for local file uploads (single-instance; switch to S3 for scale)
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Set manually in Render dashboard — do not commit the Atlas URI to git
      - key: MONGO_URI
        sync: false
      # Auto-generated by Render on first deploy
      - key: SESSION_SECRET
        generateValue: true
      # Set to https://<your-frontend>.onrender.com after first deploy
      - key: FRONTEND_ORIGIN
        sync: false
      # Set to https://<your-frontend>.onrender.com after first deploy
      - key: APP_URL
        sync: false
      - key: STORAGE_PROVIDER
        value: local
      - key: APP_NAME
        value: Architectonic
      - key: SMTP_FROM
        value: Architectonic <noreply@example.com>
      # Optional SMTP — leave blank to use Ethereal catch-all in dev
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
